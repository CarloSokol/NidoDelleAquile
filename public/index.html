<!DOCTYPE html>
<html lang="it">
<head>
  <style>
    body {
      zoom: 0.85;
    }

    @media (max-width: 768px) {
      body {
        zoom: 1;
      }
    }
  </style>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ordinazione Ristorante</title>
  <link href="tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-200 p-6">
<div class="max-w-7xl mx-auto bg-white p-6 rounded-2xl shadow-xl flex gap-6">
  
  <div id="admin-sidebar" class="w-1/5 space-y-4">
    <img src="logo.png" alt="Logo" class="h-24 mx-auto mb-2">
    <h1 class="text-xl font-bold text-center mb-2">Pannello Admin</h1>

    <div>
      <label for="tavolo" class="block text-sm font-semibold mb-1">Nome del Tavolo:</label>
      <input type="text" id="tavolo" placeholder="Es. Tavolo 1" class="p-1 text-sm border rounded w-full">
      <button onclick="addTable()" class="bg-blue-500 text-white px-3 py-1 rounded mt-2 hover:bg-blue-600 w-full">
        Aggiungi Tavolo
      </button>
    </div>

    <div>
      <label for="select-tavolo" class="block text-sm font-semibold mb-2">Seleziona il Tavolo:</label>
      <select id="select-tavolo" class="p-2 text-sm border rounded w-full shadow-sm" onchange="changeTable()">
        <option value="">Seleziona un Tavolo</option>
      </select>
      <button id="delete-tavolo-btn" onclick="deleteTable()" class="bg-red-500 text-white px-3 py-2 rounded mt-2 hover:bg-red-600 w-full" disabled>
        Elimina Tavolo
      </button>
    </div>
  </div>

  <div id="menu-container" class="w-4/5">
    <input type="text" id="search" oninput="renderMenu()" placeholder="Cerca un piatto..." class="mb-4 p-2 w-full border rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-300" />
    <div id="menu" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
  </div>
</div>

<div style="position: fixed; top: 5rem; right: 2rem; width: 400px; z-index: 50;" class="bg-gray-100 p-6 text-base rounded-2xl shadow-2xl max-h-[85vh] overflow-auto">
  <h2 class="text-xl font-semibold mb-2">
    Dettaglio Ordine - <span id="selected-table" class="text-blue-600">Nessun tavolo</span>
  </h2>
  <ul id="order-list" class="mt-4 space-y-2 text-gray-700"></ul>
  <div id="bonus-list" class="mt-4 space-y-2 text-gray-700"></div>
  <div class="mt-4 text-lg font-bold" id="total-price"></div>

  <div class="mt-6 space-y-2">
    <button onclick="inviaOrdineInCucina()" class="w-full bg-orange-500 text-white font-bold px-4 py-3 rounded-xl hover:bg-orange-600 shadow-md transition transform active:scale-95">
      🚀 INVIA ORDINE IN CASSA
    </button>
    
    <div id="admin-buttons" class="space-y-2 pt-2 border-t border-gray-300">
        <button onclick="resetOrder()" class="w-full bg-gray-500 text-white px-4 py-2 rounded-xl hover:bg-gray-600">Reset</button>
        <button onclick="printOrder()" class="w-full bg-blue-600 text-white px-4 py-2 rounded-xl hover:bg-blue-700">Stampa</button>
        <button onclick="printAllTables()" class="w-full bg-green-600 text-white px-4 py-2 rounded-xl hover:bg-green-700">Stampa Tutti i Tavoli</button>
        <button onclick="deleteAllTables()" class="w-full bg-red-700 text-white px-4 py-2 rounded-xl hover:bg-red-800">Elimina Tutti i Tavoli</button>
        <button onclick="exportToExcel()" class="w-full bg-green-600 text-black px-4 py-2 rounded-xl hover:bg-green-700">Stampa Excel</button>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
    const socket = io();

    const items = [
      { name: "Antipasto NIDO DELLE AQUILE", price: 8.25, category: "Antipasti" },
      { name: "PATATINE FRITTE", price: 2.30, category: "Antipasti" },

      { name: "ARROSTICINI", price: 11.60, category: "Carne" },

      { name: "CAPOCOLLO DI SUINO", price: 9.17, category: "Carne" },
      { name: "PETTO DI POLLO", price: 9.70, category: "Carne" },
      { name: "SALSICCIA FRESCA", price: 9.33, category: "Carne" },
      { name: "BOVINO", price: 13.75, category: "Carne" },
      { name: "BOMBETTE", price: 9.96, category: "Carne" },
      { name: "ENTRECOTE", price: 17.38, category: "Carne" },
      { name: "HAMBURGER", price: 10.74, category: "Carne" },
      { name: "COSTINE", price: 7.72, category: "Carne" },
      { name: "WRUSTEL", price: 6.17, category: "Carne" },
      { name: "FILETTO ORATA", price: 10.71, category: "Pesce" },
      { name: "PESCE SPADA", price: 8.89, category: "Pesce" },
      { name: "GAMBERONI", price: 12.00, category: "Pesce" },
      { name: "FRITTURA CALAMARI", price: 9.85, category: "Pesce" },
      { name: "FOCACCIA", price: 2.50, category: "Pizze" },
      { name: "MARGHERITA", price: 3.95, category: "Pizze" },
      { name: "T346", price: 5.60, category: "Pizze" },
      { name: "EFA", price: 4.95, category: "Pizze" },
      { name: "PROSCIUTTO E FUNGHI", price: 5.40, category: "Pizze" },
      { name: "NAPOLI", price: 5.05, category: "Pizze" },
      { name: "BOSCAIOLA", price: 5.15, category: "Pizze" },
      { name: "F35", price: 6.55, category: "Pizze" },
      { name: "CAPRICCIOSA", price: 5.60, category: "Pizze" },
      { name: "DIAVOLA", price: 4.95, category: "Pizze" },
      { name: "4 FORMAGGI", price: 6.15, category: "Pizze" },
      { name: "T339", price: 5.95, category: "Pizze" },
      { name: "NIDO DELLE AQUILE", price: 5.85, category: "Pizze" },
      { name: "AGGIUNTA", price: 0.10, category: "Pizze" },
      { name: "CAFFE A CIALDA", price: 0.33, category: "Bevande" },
      { name: "ACQUA LT.0.5", price: 0.29, category: "Bevande" },
      { name: "ACQUA LT.2", price: 0.70, category: "Bevande" },
      { name: "LATTINE FANTA/COCACOLA CL.33", price: 0.85, category: "Bevande" },
      { name: "COCA COLA ALLA SPINA DA 250 CC.", price: 0.78, category: "Bevande" },
      { name: "COCA COLA ALLA SPINA DA 500 CC.", price: 1.56, category: "Bevande" },
      { name: "SPINA BECKS DA 250 CC.", price: 1.07, category: "Birre" },
      { name: "SPINA BECKS DA 500 CC.", price: 2.14, category: "Birre" },
      { name: "SPINA TENNENTS DA 250 CC.", price: 1.46, category: "Birre" },
      { name: "SPINA TENNENTS DA 500 CC.", price: 2.92, category: "Birre" },
      { name: "BECKS Bottiglia Cl.33", price: 1.25, category: "Birre" },
      { name: "DREHER BOTTIGLIA CL.33", price: 1.13, category: "Birre" },
      { name: "SPINA Lupulus Da 250cl", price: 1.13, category: "Birre" },
      { name: "SPINA Lupulus Da 500cl", price: 1.13, category: "Birre" },
      { name: "TENNENTS Bottiglia Cl.33", price: 1.87, category: "Birre" },
      { name: "VINO BOTTIGLIA", price: 7.55, category: "Vini e Alcolici" },
      { name: "PROSECCO", price: 8.00, category: "Vini e Alcolici" },
      { name: "APEROL", price: 0.89, category: "Vini e Alcolici" },
      { name: "LUCANO", price: 0.86, category: "Vini e Alcolici" },
      { name: "MONTENEGRO", price: 1.21, category: "Vini e Alcolici" },
      { name: "GRAPPA BIANCA", price: 1.31, category: "Vini e Alcolici" },
      { name: "SAMBUCA", price: 1.04, category: "Vini e Alcolici" },
      { name: "LIMONCELLO", price: 0.85, category: "Vini e Alcolici" },
      { name: "UNICUM", price: 1.03, category: "Vini e Alcolici" },
      { name: "JEGERMEISTER", price: 1.03, category: "Vini e Alcolici" },
      { name: "SAN MARZANO", price: 1.04, category: "Vini e Alcolici" },
      { name: "AMARO DEL CAPO", price: 0.92, category: "Vini e Alcolici" },
      { name: "SPUMONE", price: 2.50, category: "Dolci" }
    ];

    let tavoli = JSON.parse(localStorage.getItem('tavoli')) || {};
    let currentTable = "";
    let bonusesPerTable = {};

    function init() {
      renderMenu();
      
      const urlParams = new URLSearchParams(window.location.search);
      const tavoloDaUrl = urlParams.get('tavolo');

      if (tavoloDaUrl) {
        currentTable = tavoloDaUrl;
        if (!tavoli[currentTable]) {
            tavoli[currentTable] = [];
        }
        document.getElementById("selected-table").textContent = currentTable;
        
        // Modalità Cliente (Nasconde gli elementi gestore)
        document.getElementById("admin-sidebar").style.display = "none";
        document.getElementById("admin-buttons").style.display = "none";
        document.getElementById("menu-container").className = "w-full";
        renderOrder();
      } else {
        renderTables();
      }

      // Ascolta la cucina: quando un ordine è pronto, avvisa l'admin a schermo
      socket.on('ordine_completato_cucina', (dati) => {
        const params = new URLSearchParams(window.location.search);
        if (!params.get('tavolo')) {
            alert(`📢 Piatti pronti in cucina per il ${dati.tavolo}!`);
            if (currentTable === dati.tavolo) {
                socket.emit('richiedi_ordine_tavolo', currentTable);
            }
        }
      });

      // Riceve i piatti in tempo reale dal server per il tavolo selezionato
      socket.on('risposta_ordine_tavolo', (piattiAggiornati) => {
        if (currentTable) {
          tavoli[currentTable] = piattiAggiornati;
          localStorage.setItem('tavoli', JSON.stringify(tavoli));
          renderOrder();
        }
      });
    }

    function renderMenu() {
      const menu = document.getElementById("menu");
      const searchTerm = document.getElementById("search").value.toLowerCase();
      menu.innerHTML = "";
      const grouped = {};
      items.forEach(item => {
        if (!item.name.toLowerCase().includes(searchTerm)) return;
        if (!grouped[item.category]) grouped[item.category] = [];
        grouped[item.category].push(item);
      });
      for (const category in grouped) {
        const title = document.createElement("h3");
        title.textContent = category;
        title.className = "text-lg font-bold col-span-full mt-4 border-b pb-1";
        menu.appendChild(title);
        grouped[category].forEach(item => {
          const card = document.createElement("div");
          card.className = "bg-white border rounded-xl shadow p-2 flex justify-between items-center hover:shadow-lg transition";
          card.innerHTML = `
            <div>
              <div class="font-semibold text-sm">${item.name}</div>
              <div class="text-sm text-gray-600">${item.price.toFixed(2)}€</div>
            </div>
            <div class="flex items-center space-x-2">
              <button onclick="removeItem('${item.name}')" class="bg-red-100 hover:bg-red-200 text-red-600 px-3 py-1 rounded-full text-lg">−</button>
              <button onclick="addItem('${item.name}')" class="bg-green-100 hover:bg-green-200 text-green-600 px-3 py-1 rounded-full text-lg">+</button>
            </div>
          `;
          menu.appendChild(card);
        });
      }
    }

    function renderTables() {
      const selectTavolo = document.getElementById("select-tavolo");
      selectTavolo.innerHTML = "<option value=''>Seleziona un Tavolo</option>";
      Object.keys(tavoli).forEach(table => {
        const option = document.createElement("option");
        option.textContent = table;
        option.value = table;
        selectTavolo.appendChild(option);
      });
    }

    function changeTable() {
      currentTable = document.getElementById("select-tavolo").value;
      document.getElementById("selected-table").textContent = currentTable || "Nessun tavolo";
      
      if (currentTable) {
        // Chiede al server i dati dell'ordine per questo tavolo specifico
        socket.emit('richiedi_ordine_tavolo', currentTable);
      } else {
        renderOrder();
      }
      document.getElementById("delete-tavolo-btn").disabled = !currentTable;
    }

    function addTable() {
      const tableInput = document.getElementById("tavolo");
      const tableName = tableInput.value.trim();
      if (!tableName) { alert("Inserisci un nome o numero per il tavolo!"); return; }
      if (tavoli[tableName]) { alert("Questo tavolo esiste già!"); return; }
      
      tavoli[tableName] = [];
      localStorage.setItem('tavoli', JSON.stringify(tavoli));
      
      renderTables();
      document.getElementById("select-tavolo").value = tableName;
      changeTable();
      tableInput.value = "";
    }

    function addItem(name) {
      if (!currentTable) { 
        alert("Per favore, seleziona o aggiungi un tavolo prima di inserire i piatti!"); 
        return; 
      }
      tavoli[currentTable].push(name);
      localStorage.setItem('tavoli', JSON.stringify(tavoli));
      renderOrder();
      flashButton(`button[onclick="addItem('${name}')"]`);
    }

    function removeItem(name) {
      if (!currentTable) return;
      const index = tavoli[currentTable].indexOf(name);
      if (index > -1) {
        tavoli[currentTable].splice(index, 1);
        localStorage.setItem('tavoli', JSON.stringify(tavoli));
        renderOrder();
        flashButton(`button[onclick="removeItem('${name}')"]`);
      }
    }

    let lastActiveButton = null;
    function flashButton(selector) {
      const button = document.querySelector(selector);
      if (!button) return;
      if (lastActiveButton && lastActiveButton !== button) {
        lastActiveButton.classList.remove("ring-2", "ring-offset-2", "ring-blue-400");
      }
      button.classList.add("ring-2", "ring-offset-2", "ring-blue-400");
      lastActiveButton = button;
    }

    function renderOrder() {
      const orderList = document.getElementById("order-list");
      orderList.innerHTML = "";
      if (currentTable && tavoli[currentTable]) {
        const itemsCount = {};
        tavoli[currentTable].forEach(item => { itemsCount[item] = (itemsCount[item] || 0) + 1; });
        
        for (const [item, count] of Object.entries(itemsCount)) {
          const li = document.createElement("li");
          li.className = "flex justify-between items-center py-1";
          li.innerHTML = `${count > 1 ? `x${count} ` : ''}${item} 
            <button onclick="removeItem('${item}')" class="text-red-500 hover:text-red-700 text-xl">−</button>`;
          orderList.appendChild(li);
        }
      }
      updateTotalPrice();
    }

    function updateTotalPrice() {
      if (!currentTable || !tavoli[currentTable]) {
        document.getElementById("total-price").textContent = "";
        return;
      }
      const orderItems = tavoli[currentTable];
      const total = orderItems.reduce((sum, itemName) => {
        const item = items.find(i => i.name === itemName);
        return sum + (item ? item.price : 0);
      }, 0);
      document.getElementById("total-price").textContent = `Totale: ${total.toFixed(2)}€`;
    }

    function inviaOrdineInCucina() {
      if (!currentTable || !tavoli[currentTable] || tavoli[currentTable].length === 0) {
        alert("Il carrello è vuoto! Scegli qualcosa prima di inviare.");
        return;
      }

      const orderItems = tavoli[currentTable];
      const totaleOrdine = orderItems.reduce((sum, itemName) => {
        const item = items.find(i => i.name === itemName);
        return sum + (item ? item.price : 0);
      }, 0);

      const pacchettoOrdine = {
        tavolo: currentTable,
        piatti: orderItems,
        totale: totaleOrdine
      };

      socket.emit('nuovo_ordine', pacchettoOrdine);
      alert(`🚀 Ordine inviato con successo alla cassa per il ${currentTable}!`);
      
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get('tavolo')) {
        tavoli[currentTable] = [];
        localStorage.setItem('tavoli', JSON.stringify(tavoli));
        renderOrder();
      }
    }

    function deleteTable() {
      if (currentTable && confirm(`Vuoi eliminare il tavolo ${currentTable}?`)) {
        delete tavoli[currentTable]; localStorage.setItem('tavoli', JSON.stringify(tavoli)); renderTables(); changeTable();
      }
    }
    function deleteAllTables() {
      if (confirm("Sei sicuro di voler cancellare tutti i tavoli?")) { localStorage.removeItem('tavoli'); location.reload(); }
    }
    function resetOrder() { if (currentTable) { tavoli[currentTable] = []; renderOrder(); } }

    document.addEventListener("DOMContentLoaded", function() { init(); });
  </script>
</body>
</html>
